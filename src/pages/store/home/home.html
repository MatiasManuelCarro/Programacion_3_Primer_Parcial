<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css">
    <title>Food Store</title>
</head>

<body>
    <header class="site-header">
        <a href="/index.html" class="site-header__brand">
            <h1>&#127828; Food Store</h1>
        </a>
        <nav class="site-nav">
            <ul class="site-nav__list">
                <li class="site-nav__item"><a class="site-nav__link" href="index.html">Home</a></li>
                <li class="site-nav__item"><a class="site-nav__link" href="#">My Orders</a></li>
                <li class="site-nav__item"><a class="site-nav__link" href="#">Cart</a></li>
                <li class="site-nav__item"><a class="site-nav__link" href="#">Admin Panel</a></li>
                <li class="site-nav__item" id="login-button"><a class="site-nav__link" href="#">Login</a></li>
            </ul>
        </nav>
    </header>
    <hr class="divider" />
    <aside class="sidebar">
        <h2 class="categories__heading">Categories</h2>
        <ul id="categories-list" class="sidebar__list">
        </ul>
    </aside>
    <main class="main">
        <form id = "searchForm"class="search">
            <label class="search__label" for="searchProduct">Search Products</label>
            <input id="searchProduct" class="search__input" type="text" placeholder="Search..." />
            <p id="searchNotification" class="search__notification">TEST</p>
            <!-- <button class="search__button" type="submit">Search</button> -->
        </form>

        <h2 class="products__heading">Featured Products</h2>
        <section id="products-container" class="products"></section>
    </main>
    <footer class="site-footer">
        <small class="site-footer__small">&reg; 2026 Food Store. All rights reserved. <br />Page
            created by Matias Carro <br />matiasmanuelcarro@gmail.com
        </small>
    </footer>
    <div id="modal" class="modal">
        <div id="modal-cart" class="modal-window">
            <h2 class="modal-window__title">Shopping Cart</h2>
            <p id="cart-message" class="modal-window__message"></p>
            <button class="modal-cart__close close" id="close-cart">&times;</button>
        </div>
    </div>

    <script type="module" src="/src/pages/store/home/home.ts"></script>
</body>

</html>
